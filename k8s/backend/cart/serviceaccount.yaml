# After terraform apply, get the real role ARN and update this annotation:
# terraform output -raw cart_irsa_role_arn
# Then re-apply: kubectl apply -f k8s/backend/cart/serviceaccount.yaml

apiVersion: v1
kind: ServiceAccount
metadata:
  name: cart-sa
  namespace: retail-app
  labels:
    app: cart
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::026138522504:role/project-bedrock-cart-irsa"
