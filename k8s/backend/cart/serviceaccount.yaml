# This ServiceAccount will be annotated with the IAM role ARN after terraform apply.
# The IAM role must have permission to read/write the DynamoDB cart table.
#
# After terraform apply, annotate with:
# kubectl annotate serviceaccount cart-sa \
#   --namespace retail-app \
#   eks.amazonaws.com/role-arn=arn:aws:iam::026138522504:role/project-bedrock-cart-irsa

apiVersion: v1
kind: ServiceAccount
metadata:
  name: cart-sa
  namespace: retail-app
  labels:
    app: cart
  annotations:
    eks.amazonaws.com/role-arn: "PLACEHOLDER_IRSA_ROLE_ARN"
