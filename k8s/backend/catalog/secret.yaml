# After terraform apply, populate this secret with the actual password:
#
# PASSWORD=$(aws secretsmanager get-secret-value \
#   --secret-id project-bedrock/rds/mysql \
#   --query SecretString --output text | jq -r .password)
#
# kubectl create secret generic catalog-secret \
#   --namespace retail-app \
#   --from-literal=RETAIL_CATALOG_PERSISTENCE_PASSWORD=$PASSWORD \
