apiVersion: v1
kind: Secret
metadata:
  name: catalog-secret
  namespace: retail-app
  labels:
    app: catalog
type: Opaque
stringData:
  RETAIL_CATALOG_PERSISTENCE_PASSWORD: "PLACEHOLDER"
