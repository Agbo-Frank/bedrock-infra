apiVersion: v1
kind: ConfigMap
metadata:
  name: orders-config
  namespace: retail-app
  labels:
    app: orders
data:
  RETAIL_ORDERS_PERSISTENCE_PROVIDER: "postgres"
  RETAIL_ORDERS_PERSISTENCE_ENDPOINT: "PLACEHOLDER_RDS_ENDPOINT:5432"
  RETAIL_ORDERS_PERSISTENCE_NAME: "ordersdb"
  RETAIL_ORDERS_PERSISTENCE_USERNAME: "dbadmin"
  RETAIL_ORDERS_MESSAGING_PROVIDER: "rabbitmq"
  RETAIL_ORDERS_MESSAGING_RABBITMQ_ADDRESSES: "rabbitmq:5672"
  RETAIL_ORDERS_MESSAGING_RABBITMQ_USERNAME: "guest"
  RETAIL_ORDERS_MESSAGING_RABBITMQ_PASSWORD: "guest"
