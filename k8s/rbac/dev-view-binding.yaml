apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: bedrock-dev-view-binding
subjects:
  - kind: User
    name: bedrock-dev-view   # must match the IAM username exactly
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: view                 # built-in K8s read-only role
  apiGroup: rbac.authorization.k8s.io
